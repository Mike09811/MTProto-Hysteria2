listen: :443
tls:
  cert: /certs/fullchain.pem
  key: /certs/privkey.pem
auth:
  type: password
  password: CHANGE_ME_HY2_PASSWORD
masquerade:
  type: proxy
  proxy:
    url: https://www.bing.com
    rewriteHost: true
bandwidth:
  up: 100 mbps
  down: 100 mbps
tcpForwarding:
  - listen: 127.0.0.1:8443
    remote: mtproxy:443
